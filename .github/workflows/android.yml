name: Android CI Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build & Test Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Restore environment template
        run: |
          if [ -f ".env.example" ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Restore Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No debug.keystore.base64 found, skipping keystore decoding"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission to Gradlew
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          fi

      - name: Run Clean and Compile
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew clean compileDebugKotlin
          else
            gradle clean compileDebugKotlin
          fi

      - name: Run Unit Tests
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew testDebugUnitTest
          else
            gradle testDebugUnitTest
          fi

      - name: Build Debug APK
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
